services:
  dadou-vision:
    container_name: dadou-vision-container
    image: dadouuu/dadou-vision-arm:latest
    build:
      context: ../../..
      dockerfile: conf/docker/arm/Dockerfile-arm
    environment:
      - ALSA_CARD=0
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-42}
    network_mode: "host"

    # Chemins RELATIFS au fichier compose (pattern du parc, cf. dadou_robot_ros) :
    # portables PC/Pi quel que soit le point de montage du dépôt. La leçon
    # « pas de ~ sous sudo » ne concerne que ~, pas les relatifs — compose les
    # résout par rapport à CE fichier, pas au répertoire d'appel.
    volumes:
      - ../../../conf:/home/ros2_ws/src/vision/conf
      - ../../../vision:/home/ros2_ws/src/vision/vision
      - ../../../dadou_utils_ros:/home/ros2_ws/src/vision/dadou_utils_ros
      - ../../../medias:/home/ros2_ws/src/vision/medias
      # robot_interfaces (StringTime...) arrive par rsync ansible au niveau
      # src/, comme sur les autres machines du parc — pas encore utilisé par
      # le heartbeat V0, prêt pour /face /audio en V2.
      - ../../../../robot_interfaces:/home/ros2_ws/src/robot_interfaces
      # Workspace colcon partagé entre les dépôts dadou_*_ros (comme robot).
      - ../../../../../build:/home/ros2_ws/build
      - ../../../../../install:/home/ros2_ws/install
      - ../../../../../log:/home/ros2_ws/log
      - ../../../conf/ros2/setup.py:/home/ros2_ws/src/vision/setup.py
      - ../../../conf/ros2/package.xml:/home/ros2_ws/src/vision/package.xml
      # Launch file V1 (vision.launch.py : heartbeat + person_tracker) — même
      # logique que setup.py/package.xml ci-dessus : bind-mount pour édition
      # à chaud (sentinelle vision/CHANGE -> colcon build), copié aussi dans
      # l'image par le Dockerfile pour un premier build sans montage.
      - ../../../conf/ros2/launch:/home/ros2_ws/src/vision/launch
      - /dev:/dev
      # Audio (TTS, pas encore utilisé par le heartbeat V0, prêt pour V2).
      - /dev/snd:/dev/snd
    privileged: true
